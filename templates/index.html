<!DOCTYPE html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width">
<title>资产管理</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:微软雅黑;background:#f5f7fa}
.header{background:#2a5c96;color:white;padding:16px 20px}
.container{max-width:1200px;margin:auto;padding:20px}
.card{background:white;border-radius:12px;box-shadow:0 2px 10px #0000000a;padding:20px;margin-bottom:20px}
input,select,button{width:100%;padding:10px;margin:6px 0;border:1px solid #ddd;border-radius:6px}
button{background:#2a5c96;color:white;border:none}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{border:1px solid #eee;padding:10px;text-align:center}
th{background:#f8f9fa}
.nav{display:flex;gap:10px;margin-bottom:20px}
.nav a{padding:10px 16px;background:white;border-radius:6px;text-decoration:none;color:#333}
.nav a.active{background:#2a5c96;color:white}
.logout{margin-left:auto;color:white}
</style>

<div class="header">
    <h2>资产管理</h2>
    <a href="/logout" style="color:white">退出登录</a>
</div>
<div class="container">
<div class="nav">
<a class="active" href="/">资产列表</a>
<a href="/record">出入记录</a>
<a href="/query">资产查询</a>
</div>

<div class="card">
<h4>新增资产</h4>
<form method="post" action="/add_asset">
<input name="asset_id" placeholder="资产编号" required>
<input name="name" placeholder="资产名称" required>
<input name="model" placeholder="型号">
<input name="purchase_time" placeholder="采购时间 2025-01-01">
<input name="location" placeholder="存放位置">
<input name="total_quantity" type="number" value="1">
<button>添加</button>
</form>
</div>

<div class="card">
<h4>资产列表</h4>
<table>
<tr><th>编号</th><th>名称</th><th>型号</th><th>位置</th><th>总数</th><th>剩余</th><th>状态</th></tr>
{% for a in assets %}
<tr>
<td>{{a.asset_id}}</td>
<td>{{a.name}}</td>
<td>{{a.model}}</td>
<td>{{a.location}}</td>
<td>{{a.total_quantity}}</td>
<td>{{a.current_quantity}}</td>
<td>{{a.status}}</td>
</tr>
{% endfor %}
</table>
</div>
</div>
