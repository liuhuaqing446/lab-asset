<!DOCTYPE html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width">
<title>登录</title>
<style>
body{display:flex;justify-content:center;align-items:center;height:100vh;margin:0;background:#f5f7fa;font-family:微软雅黑}
.box{background:white;padding:30px;border-radius:12px;box-shadow:0 2px 20px #00000010;width:340px}
input{width:100%;padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:6px}
button{width:100%;padding:12px;background:#2a5c96;color:white;border:none;border-radius:6px}
h2{text-align:center}
</style>
<div class="box">
<h2>实验室资产管理系统</h2>
<form method="post">
<input name="username" placeholder="账号" required>
<input name="password" type="password" placeholder="密码" required>
<button>登录</button>
</form>
</div>
