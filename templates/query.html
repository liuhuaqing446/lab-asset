<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ system_name }} - 资产查询</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Microsoft YaHei", sans-serif; }
        body { background: #f5f7fa; padding: 15px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { background: #2980b9; color: #fff; padding: 18px 20px; border-radius: 12px 12px 0 0; text-align: center; }
        .nav { background: #fff; padding: 12px 20px; border-bottom: 1px solid #e1e8ed; display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }
        .nav a { text-decoration: none; color: #2c3e50; font-size: 15px; font-weight: 500; padding: 6px 0; border-bottom: 2px solid transparent; transition: all 0.3s; }
        .nav a.active { color: #2980b9; border-bottom-color: #2980b9; }
        .nav .logout { margin-left: auto; color: #e74c3c; }
        .content { background: #fff; padding: 30px 20px; border-radius: 0 0 12px 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.05); }

        /* 核心修复：查询页布局，标签与输入框分行，清除所有多余文字 */
        .query-form { max-width: 800px; margin: 0 auto 30px; display: flex; gap: 20px; align-items: flex-end; flex-wrap: wrap; justify-content: center; }
        .form-group { 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
            min-width: 240px;
        }
        .form-group label { 
            color: #34495e; 
            font-size: 16px; 
            font-weight: 500;
            text-align: left;
            width: 100%;
        }
        .form-group input, .form-group select { 
            padding: 14px 16px; 
            border: 1px solid #e1e8ed; 
            border-radius: 8px; 
            font-size: 15px; 
            width: 100%;
            transition: border-color 0.3s;
        }
        .form-group input::placeholder { 
            color: transparent; 
            display: none;
        }
        .form-group input:focus, .form-group select:focus { 
            outline: none; 
            border-color: #2980b9; 
            box-shadow: 0 0 0 3px rgba(41,128,185,0.1); 
        }
        .btn-query { 
            padding: 14px 35px; 
            background: #2980b9; 
            color: #fff; 
            border: none; 
            border-radius: 8px; 
            font-size: 16px; 
            font-weight: 600; 
            cursor: pointer; 
            white-space: nowrap; 
            transition: background 0.3s;
            margin-bottom: 8px;
        }
        .btn-query:hover { background: #1a5276; }

        /* 查询结果样式：修复未归还记录布局 */
        .result-card { background: #f8f9fa; border-radius: 8px; padding: 20px; margin-bottom: 20px; border-left: 4px solid #2980b9; }
        .result-card h3 { color: #2c3e50; margin-bottom: 18px; font-size: 18px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .asset-info { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 15px; }
        .info-item { color: #34495e; font-size: 14px; line-height: 1.5; }
        .info-item span { font-weight: 600; color: #2980b9; margin-right: 6px; }
        .category-tag { display: inline-block; padding: 4px 10px; border-radius: 4px; color: #fff; font-size: 12px; font-weight: 500; }
        .category-1 { background: #3498db; }
        .category-2 { background: #e67e22; }
        .category-3 { background: #7f8c8d; }
        .no-data { text-align: center; color: #7f8c8d; font-size: 16px; padding: 60px 0; line-height: 1.8; }
        .unreturned-title { color: #e74c3c; font-size: 15px; margin: 20px 0 10px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .unreturned-title::before { content: "⚠️"; font-size: 14px; }
        /* 核心修复：未归还记录表格布局，适配手机端 */
        .unreturned-table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 10px;
            table-layout: fixed;
        }
        .unreturned-table th { 
            background: #e9ecef; 
            padding: 12px 8px; 
            text-align: center; 
            font-size: 14px; 
            color: #495057; 
            border-bottom: 2px solid #dee2e6;
            word-wrap: break-word;
        }
        .unreturned-table td { 
            padding: 12px 8px; 
            text-align: center; 
            font-size: 14px; 
            color: #2c3e50; 
            border-bottom: 1px solid #dee2e6;
            word-wrap: break-word;
        }
        .status-in { color: #27ae60; font-weight: 700; }
        .status-out { color: #e74c3c; font-weight: 700; }
        .return-time { color: #e74c3c; font-weight: 600; }

        /* 响应式：彻底修复手机端布局 */
        @media (max-width: 992px) {
            .asset-info { grid-template-columns: repeat(2, 1fr); }
            .unreturned-table th, .unreturned-table td { font-size: 13px; padding: 10px 6px; }
        }
        @media (max-width: 768px) {
            .query-form { 
                flex-direction: column; 
                align-items: stretch; 
                max-width: 100%;
                gap: 15px;
            }
            .form-group { 
                min-width: auto;
                width: 100%;
            }
            .btn-query {
                width: 100%;
                margin-top: 10px;
            }
            .asset-info { grid-template-columns: 1fr; }
            /* 手机端未归还记录表格横向滚动 */
            .unreturned-table { display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; }
            .unreturned-table th, .unreturned-table td { 
                min-width: 100px; 
                font-size: 13px;
            }
            .nav { justify-content: flex-start; gap: 15px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>{{ system_name }}</h1>
        </div>
        <div class="nav">
            <a href="/">资产列表</a>
            <a href="/record">出入记录</a>
            <a href="/query" class="active">资产查询</a>
            <a href="/logout" class="logout">退出登录</a>
        </div>
        <div class="content">
            <div style="margin-bottom:12px;">
                <a href="/export_all" style="padding:8px 16px;background:#27ae60;color:white;border-radius:6px;text-decoration:none;display:inline-block;">导出资产 + 出入记录（Excel）</a>
            </div>
            <!-- 核心修复：删除所有多余文字，标签与输入框分行 -->
            <form class="query-form" id="queryForm">
                <div class="form-group">
                    <label>资产编号/名称</label>
                    <input type="text" id="searchKey">
                </div>
                <div class="form-group">
                    <label>设备分类</label>
                    <select id="categoryFilter">
                        <option value="">全部分类</option>
                        {% for cate in categories %}
                        <option value="{{ cate }}">{{ cate }}</option>
                        {% endfor %}
                    </select>
                </div>
                <button type="submit" class="btn-query">查询资产</button>
            </form>

            <div id="resultArea"></div>
        </div>
    </div>

    <script>
        const cateClassMap = {
            "机械类": "category-1",
            "电气类": "category-2",
            "其他类": "category-3"
        };

        document.getElementById('queryForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const searchKey = document.getElementById('searchKey').value.trim();
            const category = document.getElementById('categoryFilter').value.trim();
            const resultArea = document.getElementById('resultArea');

            resultArea.innerHTML = '<div class="no-data">查询中...</div>';

            fetch('/api/asset', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ search_key: searchKey, category: category })
            })
            .then(res => res.json())
            .then(data => {
                resultArea.innerHTML = '';
                if (!data.ok) {
                    resultArea.innerHTML = `<div class="no-data">${data.msg}</div>`;
                    return;
                }
                let html = '';
                data.data.forEach(item => {
                    const asset = item.asset;
                    const unreturned = item.unreturned;
                    const cateClass = cateClassMap[asset.category] || 'category-3';
                    const statusClass = asset.status === '在库' ? 'status-in' : 'status-out';

                    html += `
                    <div class="result-card">
                        <h3>
                            ${asset.asset_id} - ${asset.name}
                            <span class="category-tag ${cateClass}">${asset.category}</span>
                        </h3>
                        <div class="asset-info">
                            <div class="info-item"><span>设备型号：</span>${asset.model_origin || '无'}</div>
                            <div class="info-item"><span>设备来源：</span>${asset.source || '未知来源'}</div>
                            <div class="info-item"><span>采购时间：</span>${asset.purchase_time || '未填写'}</div>
                            <div class="info-item"><span>存放位置：</span>${asset.location || '未填写'}</div>
                            <div class="info-item"><span>总数量：</span>${asset.total_quantity}</div>
                            <div class="info-item"><span>剩余数量：</span>${asset.current_quantity}</div>
                            <div class="info-item"><span>当前状态：</span><span class="${statusClass}">${asset.status}</span></div>
                        </div>
                    `;

                    if (unreturned.length > 0) {
                        html += `
                            <div class="unreturned-title">未归还记录</div>
                            <table class="unreturned-table">
                                <thead>
                                    <tr>
                                        <th>操作人</th>
                                        <th>未归还数量</th>
                                        <th>领用时间</th>
                                        <th>领用用途</th>
                                        <th>预计归还时间</th>
                                    </tr>
                                </thead>
                                <tbody>
                        `;
                        unreturned.forEach(ur => {
                            html += `
                                <tr>
                                    <td>${ur.person}</td>
                                    <td>${ur.quantity}</td>
                                    <td>${ur.time}</td>
                                    <td>${ur.purpose || '无'}</td>
                                    <td class="return-time">${ur.expected_return}</td>
                                </tr>
                            `;
                        });
                        html += `</tbody></table>`;
                    } else {
                        html += `<div style="color:#27ae60; margin-top:10px; font-size:14px;">✅ 该资产暂无未归还记录</div>`;
                    }

                    html += `</div>`;
                });

                resultArea.innerHTML = html;
            })
            .catch(err => {
                console.error('查询失败：', err);
                resultArea.innerHTML = '<div class="no-data">查询失败，请刷新页面重试</div>';
            });
        });
    </script>
</body>
</html>
