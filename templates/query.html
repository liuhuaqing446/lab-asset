<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>资产查询</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui, "Microsoft YaHei",sans-serif;}
body{background:#f8f9fa;line-height:1.4;}
.container{max-width:1200px;margin:0 auto;padding:16px;}
.header{background:#2a5c96;color:#fff;padding:18px;text-align:center;font-size:24px;font-weight:600;border-radius:8px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,0.08);}
.nav{background:#fff;padding:12px 16px;border-radius:8px;box-shadow:0 2px 6px rgba(0,0,0,0.05);margin-bottom:20px;display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.nav a{padding:8px 16px;border-radius:6px;text-decoration:none;color:#333;font-size:14px;}
.nav a.active{background:#2a5c96;color:#fff;font-weight:600;}
.nav a.logout{margin-left:auto;color:#666;}
.query-box{background:#fff;padding:30px 24px;border-radius:8px;box-shadow:0 2px 6px rgba(0,0,0,0.05);margin-bottom:20px;text-align:center;}
.query-box input{width:100%;max-width:500px;padding:12px 16px;border:1px solid #e5e7eb;border-radius:8px;font-size:16px;margin-bottom:16px;outline:none;}
.query-box select{padding:12px 16px;border:1px solid #e5e7eb;border-radius:8px;font-size:16px;margin:0 8px 16px 0;}
.query-box button{width:200px;height:48px;background:#2a5c96;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer;}
.result-box{background:#fff;padding:24px;border-radius:8px;box-shadow:0 2px 6px rgba(0,0,0,0.05);display:none;}
.asset-item{border:1px solid #e5e7eb;border-radius:8px;padding:20px;margin-bottom:20px;background:#fafbfc;}
.asset-info{line-height:2.4;font-size:15px;}
.asset-info p{display:flex;padding:0 8px;}
.asset-info p span:first-child{color:#666;width:140px;text-align:right;padding-right:16px;flex-shrink:0;}
.status-in{color:#07c160;font-weight:600;}
.status-out{color:#e03131;font-weight:600;}
.record-list{margin-top:16px;}
.record-list h4{font-size:16px;margin-bottom:8px;padding-left:8px;border-left:4px solid #2a5c96;}
.record-item{padding:12px;background:#fff;border:1px solid #f1f3f5;border-radius:6px;margin-bottom:12px;}
.empty{text-align:center;color:#999;padding:40px 0;}
.load{text-align:center;color:#666;padding:40px 0;}
</style>
</head>
<body>
<div class="container">
<div class="header">实验室资产管理系统</div>
<div class="nav">
<a href="/">资产列表</a>
<a href="/record">出入记录</a>
<a href="/query" class="active">资产查询</a>
<a href="/logout" class="logout">退出登录</a>
</div>

<div class="query-box">
<input type="text" id="queryText" placeholder="输入资产编号/名称查询">
<select id="queryCategory">
<option value="all">全部分类</option>
<option value="机械类">机械类</option>
<option value="电气类">电气类</option>
<option value="其他类">其他类</option>
</select>
<br>
<button onclick="search()">查询资产</button>
</div>

<div class="result-box" id="resultBox"></div>
</div>

<script>
function search(){
const q = document.getElementById('queryText').value.trim();
const c = document.getElementById('queryCategory').value;
const box = document.getElementById('resultBox');
box.style.display='block';
box.innerHTML='<div class="load">正在查询...</div>';

fetch('/api/asset',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({query:q, category:c})
}).then(res=>res.json()).then(data=>{
if(!data.assets || data.assets.length===0){
box.innerHTML='<div class="empty">未找到相关资产</div>';return;}
let html='';
data.assets.forEach(a=>{
html+=`<div class="asset-item"><div class="asset-info">
<p><span>资产编号：</span><span>${a.asset_id}</span></p>
<p><span>资产名称：</span><span>${a.name}</span></p>
<p><span>设备型号：</span><span>${a.model||'未填写'}</span></p>
<p><span>设备分类：</span><span>${a.category||'未分类'}</span></p>
<p><span>设备来源：</span><span>${a.source||'未填写'}</span></p>
<p><span>存放位置：</span><span>${a.location||'未填写'}</span></p>
<p><span>总数量：</span><span>${a.total_quantity}</span></p>
<p><span>剩余数量：</span><span>${a.current_quantity}</span></p>
<p><span>资产状态：</span><span class="${a.status=='在库'?'status-in':'status-out'}">${a.status}</span></p>
</div><div class="record-list"><h4>未归还记录</h4>`;
if(a.unreturned.length===0)html+='<div class="empty">无</div>';
else a.unreturned.forEach(r=>{
html+=`<div class="record-item">
<p>领用：${r.person}｜数量：${r.quantity}｜时间：${r.time}</p>
<p>预计归还：${r.expected_return_time||'—'}｜用途：${r.purpose||'未填写'}</p>
</div>`;
});
html+='</div></div>';
});
box.innerHTML=html;
}).catch(()=>{box.innerHTML='<div class="empty">查询失败</div>';});
}
document.getElementById('queryText').addEventListener('keydown',e=>{if(e.key==='Enter')search();});
</script>
</body>
</html>
