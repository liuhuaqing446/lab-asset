<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>{{ system_name }}</title>
  <style>
    /* 全局重置+自适应基础 */
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
    body { background: #f5f7fa; }
    .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 12px; }
    .header { background: #2a5c96; color: #fff; padding: 16px; text-align: center; font-size: 20px; font-weight: 500; }
    .nav { background: #fff; margin-bottom: 16px; padding: 12px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .nav a { text-decoration: none; color: #333; border-radius: 8px; padding: 10px 8px; font-size: 14px; flex: 1; min-width: 100px; text-align: center; transition: 0.2s; }
    .nav a.active { background: #2a5c96; color: #fff; }
    .nav a.logout { margin-left: auto; min-width: auto; }
    .form-box, .result-box { background: #fff; padding: 16px; border-radius: 12px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .form-box input { width: 100%; padding: 14px 12px; font-size: 16px; border: 1px solid #eee; border-radius: 8px; outline: none; margin-bottom: 12px; }
    .form-box input:focus { border-color: #2a5c96; }
    .btn { display: inline-block; border: none; border-radius: 8px; padding: 14px 20px; font-size: 16px; cursor: pointer; min-height: 48px; text-align: center; transition: 0.2s; background: #2a5c96; color: #fff; width: 100%; }
    .btn:hover { background: #234b7a; }
    .result-box h3 { font-size: 18px; font-weight: 500; margin-bottom: 16px; color: #333; }
    .asset-info { line-height: 2; font-size: 16px; margin-bottom: 20px; }
    .status-in { color: #07c160; font-weight: 500; }
    .status-out { color: #fa4753; font-weight: 500; }
    .record-list { border-top: 1px solid #f5f5f5; padding-top: 20px; }
    .record-item { padding: 12px 0; border-bottom: 1px solid #f5f5f5; font-size: 14px; line-height: 1.8; }
    .record-type-out { color: #fa4753; }
    .record-type-in { color: #07c160; }
    /* 桌面端适配 (>768px) */
    @media (min-width: 768px) {
      .nav { flex-wrap: nowrap; }
      .nav a { flex: none; padding: 10px 20px; font-size: 16px; }
      .form-box, .result-box { padding: 30px; }
      .asset-info { font-size: 18px; }
      .record-item { font-size: 16px; }
    }
  </style>
</head>
<body>
  <div class="header">{{ system_name }}</div>
  <div class="nav">
    <a href="/">资产列表</a>
    <a href="/record">出入记录</a>
    <a href="/query" class="active">资产查询</a>
    <a href="/logout" class="logout">退出登录</a>
  </div>

  <div class="container">
    <div class="form-box">
      <input type="text" id="assetId" placeholder="请输入资产编号查询">
      <button class="btn" onclick="searchAsset()">查询资产</button>
    </div>

    <div class="result-box" id="resultBox" style="display: none;">
      <div id="assetInfo" class="asset-info"></div>
      <div class="record-list" id="recordList"></div>
    </div>
  </div>

  <script>
    const baseUrl = "{{ request.host_url }}";
    // 资产查询方法
    function searchAsset() {
      const assetId = document.getElementById("assetId").value.trim();
      if (!assetId) {
        alert("请输入资产编号！");
        return;
      }
      // 显示加载状态
      document.getElementById("resultBox").style.display = "block";
      document.getElementById("assetInfo").innerHTML = "<p style='text-align:center;'>查询中...</p>";
      document.getElementById("recordList").innerHTML = "";

      fetch(baseUrl + "api/asset", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ asset_id: assetId })
      })
      .then(res => res.json())
      .then(data => {
        if (!data.ok) {
          document.getElementById("assetInfo").innerHTML = "<p style='color:#fa4753;'>未找到该资产，请检查编号！</p>";
          return;
        }
        const asset = data.asset;
        const unreturned = data.unreturned;
        // 渲染资产基础信息
        document.getElementById("assetInfo").innerHTML = `
          <p>资产编号：${asset.asset_id}</p>
          <p>资产名称：${asset.name}</p>
          <p>采购时间：${asset.purchase_time}</p>
          <p>存放位置：${asset.location || '未填写'}</p>
          <p>总数量：${asset.total_quantity} | 剩余数量：${asset.current_quantity}</p>
          <p>当前状态：<span class="${asset.status == '在库' ? 'status-in' : 'status-out'}">${asset.status}</span></p>
        `;
        // 渲染未归还记录
        if (unreturned.length === 0) {
          document.getElementById("recordList").innerHTML = "<p style='text-align:center; color:#666;'>暂无未归还记录</p>";
        } else {
          let recordHtml = "<h4 style='margin-bottom:12px;'>未归还领用记录</h4>";
          unreturned.forEach(r => {
            recordHtml += `
              <div class="record-item">
                <p>操作时间：${r.time}</p>
                <p>领用人员：${r.person}</p>
                <p>领用数量：${r.quantity}台</p>
                <p>使用用途：${r.purpose || '未填写'}</p>
              </div>
            `;
          });
          document.getElementById("recordList").innerHTML = recordHtml;
        }
      })
      .catch(err => {
        document.getElementById("assetInfo").innerHTML = "<p style='color:#fa4753;'>查询失败，请稍后重试！</p>";
        console.error(err);
      });
    }
    // 回车触发查询
    document.getElementById("assetId").addEventListener("keydown", (e) => {
      if (e.key === "Enter") searchAsset();
    });
  </script>
</body>
</html>
