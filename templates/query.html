<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0,user-scalable=no">
<title>{{system_name}}</title>
<style>
* {box-sizing:border-box;margin:0;padding:0;font-family:system-ui, "Microsoft YaHei", sans-serif;}
body {background:#f8f9fa;line-height:1.4;}
/* 统一宽度：1200px，和列表、记录页完全一致 */
.container {max-width:1200px;margin:0 auto;padding:16px;}

.header {background:#2a5c96;color:#fff;padding:18px;text-align:center;font-size:24px;font-weight:600;box-shadow:0 2px 8px rgba(0,0,0,0.08);margin-bottom:20px;border-radius:8px;}
.nav {background:#fff;padding:12px 16px;border-radius:8px;box-shadow:0 2px 6px rgba(0,0,0,0.05);margin-bottom:20px;display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
.nav a {padding:8px 18px;border-radius:6px;text-decoration:none;color:#333;font-size:14px;transition:all 0.2s ease;white-space:nowrap;}
.nav a.active {background:#2a5c96;color:#fff;font-weight:600;}
.nav a:hover:not(.active):not(.logout) {background:#f5f7fa;color:#2a5c96;}
.nav a.logout {margin-left:auto;color:#666;padding:8px 0;white-space:nowrap;}
.nav a.logout:hover {color:#2a5c96;background:transparent;}

/* 统一表单样式：和另外两页一致 */
.form-box {
  background:#fff; padding:24px; border-radius:8px;
  box-shadow:0 2px 6px rgba(0,0,0,0.05); margin-bottom:20px;
  text-align:left; /* 不居中，和列表页一样左对齐 */
}
.form-box input {
  width:100%; max-width:450px;
  padding:10px 14px; border:1px solid #e5e7eb; border-radius:6px;
  font-size:14px; transition:all 0.2s ease; outline:none;
  display:block; margin-bottom:16px;
}
.form-box input:focus {
  border-color:#2a5c96;
  box-shadow:0 0 0 3px rgba(42,92,150,0.1);
}
.btn-query {
  width:180px; height:42px;
  background:#2a5c96; color:#fff; border:none; border-radius:6px;
  font-size:15px; cursor:pointer; transition:all 0.2s ease;
}
.btn-query:hover {background:#234b7a;transform:translateY(-1px);}
.btn-query:active {transform:translateY(0);}

.result-box {background:#fff;padding:24px;border-radius:8px;box-shadow:0 2px 6px rgba(0,0,0,0.05);display:none;}
.asset-info {line-height:2.4;font-size:15px;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid #e5e7eb;}
.asset-info p {display:flex;align-items:center;padding:0 8px;margin:0;flex-wrap:nowrap;}
.asset-info p span:first-child {color:#666;width:140px;text-align:right;padding-right:16px;flex-shrink:0;white-space:nowrap;}
.asset-info p span:last-child {font-weight:500;color:#333;flex:1;text-align:left;min-width:0;}
.status-in {color:#07c160;font-weight:600;}
.status-out {color:#e03131;font-weight:600;}
.record-list h4 {font-size:16px;color:#333;margin-bottom:16px;padding-left:8px;border-left:4px solid #2a5c96;}
.record-item {padding:14px;border-radius:6px;background:#fafbfc;margin-bottom:12px;border:1px solid #f1f3f5;}
.record-item p {font-size:14px;margin-bottom:8px;}
.record-item p:last-child {margin-bottom:0;}
.record-item p span {color:#666;margin-right:8px;}
.empty-tip {text-align:center;color:#999;padding:40px 0;font-size:15px;}
.loading-tip {text-align:center;color:#666;padding:40px 0;font-size:15px;}

/* 手机端：完全不动，保持你现在满意的适配 */
@media (max-width:768px) {
  .nav {flex-wrap:wrap;padding:10px;gap:6px;}
  .nav a {padding:6px 12px;font-size:13px;flex:1;text-align:center;}
  .nav a.logout {margin-left:0;flex:100%;text-align:right;}
  .header {padding:14px;font-size:20px;}
  .form-box {padding:16px;}
  .form-box input, .btn-query {max-width:100%;font-size:15px;}
  .result-box {padding:20px 16px;}
  .asset-info {line-height:2;font-size:14px;}
  .asset-info p span:first-child {width:100px;padding-right:8px;}
  .record-item {padding:12px;font-size:13px;}
}
</style>
</head>
<body>
<div class="container">
  <div class="header">{{system_name}}</div>
  <div class="nav">
    <a href="/">资产列表</a>
    <a href="/record">出入记录</a>
    <a href="/query" class="active">资产查询</a>
    <a href="/logout" class="logout">退出登录</a>
  </div>

  <div class="form-box">
    <input type="text" id="assetId" placeholder="请输入资产编号进行查询" autocomplete="off">
    <button class="btn-query" onclick="searchAsset()">查询资产信息</button>
  </div>

  <div class="result-box" id="resultBox">
    <div class="asset-info" id="assetInfo"></div>
    <div class="record-list" id="recordList"></div>
  </div>
</div>

<script>
const baseUrl = window.location.origin;
document.getElementById('assetId').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') searchAsset();
  if (e.key === ' ') e.preventDefault();
});

function searchAsset() {
  const assetId = document.getElementById("assetId").value.trim();
  if (!assetId) { alert("请输入有效的资产编号！"); return; }
  const resultBox = document.getElementById("resultBox");
  const assetInfo = document.getElementById("assetInfo");
  const recordList = document.getElementById("recordList");
  resultBox.style.display = "block";
  assetInfo.innerHTML = '<div class="loading-tip">正在查询，请稍候...</div>';
  recordList.innerHTML = "";

  fetch(`${baseUrl}/api/asset`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ asset_id: assetId }),
    timeout: 5000
  })
  .then(res => {
    if (!res.ok) throw new Error("网络请求失败");
    return res.json();
  })
  .then(data => {
    if (!data.ok) {
      assetInfo.innerHTML = '<div class="empty-tip" style="color:#e03131;">未找到该资产，请检查编号！</div>';
      return;
    }
    const asset = data.asset;
    assetInfo.innerHTML = `
      <p><span>资产编号：</span><span>${asset.asset_id}</span></p>
      <p><span>资产名称：</span><span>${asset.name}</span></p>
      <p><span>设备型号：</span><span>${asset.model || '未填写'}</span></p>
      <p><span>采购时间：</span><span>${asset.purchase_time}</span></p>
      <p><span>存放位置：</span><span>${asset.location || '未填写'}</span></p>
      <p><span>资产总数量：</span><span>${asset.total_quantity}</span></p>
      <p><span>剩余可领用数量：</span><span>${asset.current_quantity}</span></p>
      <p><span>当前资产状态：</span><span class="${asset.status=='在库'?'status-in':'status-out'}">${asset.status}</span></p>
    `;
    const unreturned = data.unreturned || [];
    if (unreturned.length === 0) {
      recordList.innerHTML = '<div class="empty-tip">该资产暂无未归还的领用记录</div>';
      return;
    }
    recordList.innerHTML = '<h4>未归还领用记录</h4>';
    unreturned.forEach(r => {
      recordList.innerHTML += `
        <div class="record-item">
          <p><span>领用人员：</span>${r.person}</p>
          <p><span>未归还数量：</span>${r.quantity}</p>
          <p><span>最新领用时间：</span>${r.time}</p>
          <p><span>使用用途：</span>${r.purpose || '未填写'}</p>
        </div>
      `;
    });
  })
  .catch(err => {
    assetInfo.innerHTML = `<div class="empty-tip" style="color:#e03131;">${err.message}，请稍后重试！</div>`;
    console.error("查询错误：", err);
  });
}

setInterval(() => { fetch(window.location.origin).catch(err=>{}); }, 600000);
</script>
</body>
</html>
