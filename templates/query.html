<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ system_name }} - 资产查询</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Microsoft YaHei", sans-serif; }
        body { background-color: #f5f7fa; padding: 15px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { background: #2980b9; color: #fff; padding: 18px 20px; border-radius: 12px 12px 0 0; text-align: center; }
        .header h1 { font-size: 24px; font-weight: 600; }
        .nav { background: #fff; padding: 12px 20px; border-bottom: 1px solid #e1e8ed; display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }
        .nav a { text-decoration: none; color: #2c3e50; font-size: 15px; font-weight: 500; padding: 6px 0; border-bottom: 2px solid transparent; transition: all 0.3s; }
        .nav a.active { color: #2980b9; border-bottom-color: #2980b9; }
        .nav .logout { margin-left: auto; color: #e74c3c; }
        .content { background: #fff; padding: 20px; border-radius: 0 0 12px 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.05); }

        /* 查询表单布局（电脑横排 / 手机竖排） */
        .query-form {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 180px;
        }
        .form-group label {
            color: #34495e;
            font-size: 14px;
            font-weight: 500;
        }
        .form-group input,
        .form-group select {
            padding: 10px 14px;
            border: 1px solid #e1e8ed;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #2980b9;
            box-shadow: 0 0 0 3px rgba(41,128,185,0.1);
        }
        .btn-query {
            padding: 10px 28px;
            background: #2980b9;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: background-color 0.3s;
        }
        .btn-query:hover {
            background: #1a5276;
        }

        /* 查询结果卡片 */
        .result-card {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 18px;
            margin-bottom: 18px;
            border-left: 4px solid #2980b9;
        }
        .result-card h3 {
            color: #2c3e50;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            font-size: 18px;
        }
        .asset-info {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 15px;
        }
        .info-item {
            color: #34495e;
            font-size: 14px;
        }
        .info-item span {
            font-weight: 600;
            color: #2980b9;
            margin-right: 5px;
        }
        .category-tag {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            color: #fff;
        }
        .category-1 { background: #3498db; }
        .category-2 { background: #e67e22; }
        .category-3 { background: #7f8c8d; }
        .no-data {
            text-align: center;
            color: #7f8c8d;
            font-size: 16px;
            padding: 40px 0;
        }
        .unreturned-title {
            color: #e74c3c;
            font-size: 15px;
            margin: 15px 0 10px;
            font-weight: 600;
        }
        .unreturned-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        .unreturned-table th {
            background: #e9ecef;
            padding: 10px 12px;
            text-align: center;
            font-size: 14px;
            color: #495057;
            border-bottom: 2px solid #dee2e6;
        }
        .unreturned-table td {
            padding: 10px 12px;
            text-align: center;
            font-size: 14px;
            color: #2c3e50;
            border-bottom: 1px solid #dee2e6;
        }
        .return-time {
            color: #e74c3c;
            font-weight: 500;
        }
        .status-in { color: #27ae60; font-weight: 700; }
        .status-out { color: #e74c3c; font-weight: 700; }

        /* 响应式：电脑 / 平板 / 手机全部完美适配 */
        @media (max-width: 992px) {
            .asset-info { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 768px) {
            .query-form { flex-direction: column; align-items: stretch; }
            .form-group { min-width: auto; }
            .asset-info { grid-template-columns: 1fr; }
            .unreturned-table { display: block; overflow-x: auto; }
            .nav { gap: 15px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>{{ system_name }}</h1>
        </div>
        <div class="nav">
            <a href="/">资产列表</a>
            <a href="/record">出入记录</a>
            <a href="/query" class="active">资产查询</a>
            <a href="/logout" class="logout">退出登录</a>
        </div>
        <div class="content">

            <!-- 查询表单：编号 + 名称 + 分类 -->
            <form class="query-form" id="queryForm">
                <div class="form-group">
                    <label>资产编号</label>
                    <input type="text" id="assetId" placeholder="请输入资产编号">
                </div>
                <div class="form-group">
                    <label>资产名称</label>
                    <input type="text" id="assetName" placeholder="请输入资产名称">
                </div>
                <div class="form-group">
                    <label>设备分类</label>
                    <select id="categoryFilter">
                        <option value="">全部分类</option>
                        {% for cate in categories %}
                        <option value="{{ cate }}">{{ cate }}</option>
                        {% endfor %}
                    </select>
                </div>
                <button type="submit" class="btn-query">查询资产</button>
            </form>

            <!-- 查询结果展示 -->
            <div id="resultArea"></div>
        </div>
    </div>

    <script>
        const cateClassMap = {
            "机械类": "category-1",
            "电气类": "category-2",
            "其他类": "category-3"
        };

        // 查询提交（支持：编号 + 名称 + 分类）
        document.getElementById('queryForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const asset_id = document.getElementById('assetId').value.trim();
            const asset_name = document.getElementById('assetName').value.trim();
            const category = document.getElementById('categoryFilter').value.trim();
            const resultArea = document.getElementById('resultArea');

            resultArea.innerHTML = '';

            fetch('/api/asset', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ asset_id, asset_name, category })
            })
            .then(res => res.json())
            .then(data => {
                if (!data.ok) {
                    resultArea.innerHTML = `<div class="no-data">${data.msg}</div>`;
                    return;
                }

                let html = '';
                data.data.forEach(item => {
                    const asset = item.asset;
                    const unreturned = item.unreturned;
                    const cateClass = cateClassMap[asset.category] || 'category-3';
                    const statusClass = asset.status === '在库' ? 'status-in' : 'status-out';

                    html += `
                    <div class="result-card">
                        <h3>
                            资产信息：${asset.asset_id} - ${asset.name}
                            <span class="category-tag ${cateClass}">${asset.category}</span>
                        </h3>
                        <div class="asset-info">
                            <div class="info-item"><span>设备型号：</span>${asset.model_origin || '无'}</div>
                            <div class="info-item"><span>设备来源：</span>${asset.source || '未知来源'}</div>
                            <div class="info-item"><span>采购时间：</span>${asset.purchase_time || '未填写'}</div>
                            <div class="info-item"><span>存放位置：</span>${asset.location || '未填写'}</div>
                            <div class="info-item"><span>总数量：</span>${asset.total_quantity}</div>
                            <div class="info-item"><span>剩余数量：</span>${asset.current_quantity}</div>
                            <div class="info-item"><span>当前状态：</span><span class="${statusClass}">${asset.status}</span></div>
                        </div>
                    `;

                    if (unreturned.length > 0) {
                        html += `
                            <div class="unreturned-title">⚠️ 未归还记录</div>
                            <table class="unreturned-table">
                                <thead>
                                    <tr>
                                        <th>操作人</th>
                                        <th>未归还数量</th>
                                        <th>领用时间</th>
                                        <th>领用用途</th>
                                        <th>预计归还时间</th>
                                    </tr>
                                </thead>
                                <tbody>
                        `;
                        unreturned.forEach(ur => {
                            html += `
                                <tr>
                                    <td>${ur.person}</td>
                                    <td>${ur.quantity}</td>
                                    <td>${ur.time}</td>
                                    <td>${ur.purpose || '无'}</td>
                                    <td class="return-time">${ur.expected_return}</td>
                                </tr>
                            `;
                        });
                        html += `</tbody></table>`;
                    } else {
                        html += `<div style="color:#27ae60; margin-top:10px;">✅ 该资产暂无未归还记录</div>`;
                    }

                    html += `</div>`;
                });

                resultArea.innerHTML = html;
            })
            .catch(() => {
                resultArea.innerHTML = `<div class="no-data">查询失败，请刷新重试</div>`;
            });
        });
    </script>
</body>
</html>
