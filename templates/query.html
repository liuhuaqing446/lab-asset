<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ system_name }} - 资产查询</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Microsoft YaHei", sans-serif; }
        body { background-color: #f5f7fa; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { background: #2980b9; color: #fff; padding: 20px 30px; border-radius: 12px 12px 0 0; text-align: center; }
        .header h1 { font-size: 28px; font-weight: 600; }
        .nav { background: #fff; padding: 15px 30px; border-bottom: 1px solid #e1e8ed; display: flex; gap: 30px; align-items: center; }
        .nav a { text-decoration: none; color: #2c3e50; font-size: 16px; font-weight: 500; padding: 8px 0; border-bottom: 2px solid transparent; transition: all 0.3s; }
        .nav a.active { color: #2980b9; border-bottom-color: #2980b9; }
        .nav .logout { margin-left: auto; color: #e74c3c; }
        .content { background: #fff; padding: 30px; border-radius: 0 0 12px 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.05); }
        .query-form { display: flex; gap: 15px; align-items: flex-end; margin-bottom: 30px; flex-wrap: wrap; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group label { color: #34495e; font-size: 15px; font-weight: 500; }
        .form-group input, .form-group select { padding: 12px 16px; border: 1px solid #e1e8ed; border-radius: 8px; font-size: 15px; width: 220px; transition: border-color 0.3s; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #2980b9; box-shadow: 0 0 0 3px rgba(41,128,185,0.1); }
        .btn-query { padding: 12px 30px; background: #2980b9; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background-color 0.3s; }
        .btn-query:hover { background: #1a5276; }
        .result-card { background: #f8f9fa; border-radius: 8px; padding: 20px; margin-bottom: 20px; border-left: 4px solid #2980b9; }
        .result-card h3 { color: #2c3e50; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .asset-info { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 15px; }
        .info-item { color: #34495e; font-size: 14px; }
        .info-item span { font-weight: 600; color: #2980b9; margin-right: 5px; }
        .category-tag { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 12px; color: #fff; }
        .category-1 { background: #3498db; } /* 机械类 */
        .category-2 { background: #e67e22; } /* 电气类 */
        .category-3 { background: #7f8c8d; } /* 其他类 */
        .no-data { text-align: center; color: #7f8c8d; font-size: 16px; padding: 40px 0; }
        .unreturned-title { color: #e74c3c; font-size: 16px; margin: 15px 0 10px; font-weight: 600; }
        .unreturned-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .unreturned-table th { background: #e9ecef; padding: 10px 12px; text-align: center; font-size: 14px; color: #495057; border-bottom: 2px solid #dee2e6; }
        .unreturned-table td { padding: 10px 12px; text-align: center; font-size: 14px; color: #2c3e50; border-bottom: 1px solid #dee2e6; }
        .return-time { color: #e74c3c; font-weight: 500; }
        @media (max-width: 992px) { .asset-info { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 768px) { 
            .query-form { flex-direction: column; align-items: flex-start; }
            .form-group input, .form-group select { width: 100%; }
            .asset-info { grid-template-columns: 1fr; }
            .unreturned-table { display: block; overflow-x: auto; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>{{ system_name }}</h1>
        </div>
        <div class="nav">
            <a href="/">资产列表</a>
            <a href="/record">出入记录</a>
            <a href="/query" class="active">资产查询</a>
            <a href="/logout" class="logout">退出登录</a>
        </div>
        <div class="content">
            <!-- 查询表单：资产编号+分类筛选 -->
            <form class="query-form" id="queryForm">
                <div class="form-group">
                    <label>资产编号</label>
                    <input type="text" id="assetId" placeholder="可留空，仅按分类查询">
                </div>
                <div class="form-group">
                    <label>设备分类筛选</label>
                    <select id="categoryFilter">
                        <option value="">全部分类</option>
                        {% for cate in categories %}
                        <option value="{{ cate }}">{{ cate }}</option>
                        {% endfor %}
                    </select>
                </div>
                <button type="submit" class="btn-query">查询资产</button>
            </form>

            <!-- 查询结果展示区域 -->
            <div id="resultArea"></div>
        </div>
    </div>

    <script>
        // 分类标签样式映射
        const cateClassMap = {
            "机械类": "category-1",
            "电气类": "category-2",
            "其他类": "category-3"
        };

        // 表单提交事件
        document.getElementById('queryForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const assetId = document.getElementById('assetId').value.trim();
            const category = document.getElementById('categoryFilter').value;
            const resultArea = document.getElementById('resultArea');

            // 清空之前的结果
            resultArea.innerHTML = '';

            // 发送请求
            fetch('/api/asset', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    asset_id: assetId,
                    category: category
                })
            })
            .then(res => res.json())
            .then(data => {
                if (!data.ok) {
                    // 无数据提示
                    resultArea.innerHTML = `<div class="no-data">${data.msg}</div>`;
                    return;
                }

                // 渲染查询结果
                let html = '';
                data.data.forEach(item => {
                    const asset = item.asset;
                    const unreturned = item.unreturned;
                    const cateClass = cateClassMap[asset.category] || 'category-3';

                    // 资产基础信息
                    html += `
                    <div class="result-card">
                        <h3>
                            资产信息：${asset.asset_id} - ${asset.name}
                            <span class="category-tag ${cateClass}">${asset.category}</span>
                        </h3>
                        <div class="asset-info">
                            <div class="info-item"><span>设备型号：</span>${asset.model_origin || '无'}</div>
                            <div class="info-item"><span>设备来源：</span>${asset.source || '未知来源'}</div>
                            <div class="info-item"><span>采购时间：</span>${asset.purchase_time || '未填写'}</div>
                            <div class="info-item"><span>存放位置：</span>${asset.location || '未填写'}</div>
                            <div class="info-item"><span>总数量：</span>${asset.total_quantity}</div>
                            <div class="info-item"><span>剩余数量：</span>${asset.current_quantity}</div>
                            <div class="info-item"><span>当前状态：</span>${asset.status === '在库' ? '<span style="color:#27ae60;">在库</span>' : '<span style="color:#e74c3c;">借出</span>'}</div>
                            <div class="info-item"><span>资产ID：</span>${asset.id}</div>
                        </div>
                    `;

                    // 未归还记录
                    if (unreturned.length > 0) {
                        html += `
                            <div class="unreturned-title">⚠️ 未归还记录</div>
                            <table class="unreturned-table">
                                <thead>
                                    <tr>
                                        <th>领用人</th>
                                        <th>未归还数量</th>
                                        <th>领用时间</th>
                                        <th>领用用途</th>
                                        <th>预计归还时间</th>
                                    </tr>
                                </thead>
                                <tbody>
                        `;
                        unreturned.forEach(ur => {
                            html += `
                                <tr>
                                    <td>${ur.person}</td>
                                    <td>${ur.quantity}</td>
                                    <td>${ur.time}</td>
                                    <td>${ur.purpose || '无'}</td>
                                    <td class="return-time">${ur.expected_return}</td>
                                </tr>
                            `;
                        });
                        html += `
                                </tbody>
                            </table>
                        `;
                    } else {
                        html += `<div style="color:#27ae60; font-size:14px; margin-top:10px;">✅ 该资产暂无未归还记录</div>`;
                    }

                    html += `</div>`;
                });

                resultArea.innerHTML = html;
            })
            .catch(err => {
                resultArea.innerHTML = `<div class="no-data">查询失败，请刷新页面重试</div>`;
                console.error('查询错误：', err);
            });
        });
    </script>
</body>
</html>
